<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCAL ADMIN</title>

<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0}
.container{padding:15px;max-width:800px;margin:auto}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.add{background:green;color:#fff}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<input id="name" placeholder="Name">
<input id="link" placeholder="Link">
<textarea id="desc" placeholder="Description"></textarea>

<button class="add" onclick="addPost()">ADD</button>

<div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let editIndex = null;

function save(){
  localStorage.setItem("posts", JSON.stringify(posts));
}

function addPost(){
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;
  const desc = document.getElementById("desc").value;

  if(!name || !link){
    alert("Fill karo");
    return;
  }

  if(editIndex !== null){
    posts[editIndex] = {name,link,desc};
    editIndex = null;
  }else{
    posts.push({name,link,desc});
  }

  save();
  showPosts();

  name.value=""; link.value=""; desc.value="";
}

function showPosts(){
  const div = document.getElementById("posts");
  div.innerHTML="";

  posts.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <a href="${p.link}" target="_blank">Open</a><br>
        <button onclick="editPost(${i})">Edit</button>
        <button onclick="deletePost(${i})">Delete</button>
      </div>
    `;
  });
}

function deletePost(i){
  posts.splice(i,1);
  save();
  showPosts();
}

function editPost(i){
  document.getElementById("name").value = posts[i].name;
  document.getElementById("link").value = posts[i].link;
  document.getElementById("desc").value = posts[i].desc;

  editIndex = i;
}

showPosts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKRAAJ HUB ADMIN</title>

<style>
:root {
  --primary:#2563eb;
  --danger:#ef4444;
  --edit:#f59e0b;
}

body {
  font-family:sans-serif;
  margin:0;
  background:#f1f5f9;
}

header {
  background:#0f172a;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:800px;
  margin:auto;
  padding:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add-btn {
  background:green;
  color:#fff;
  width:100%;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  position:relative;
}

.actions {
  position:absolute;
  top:10px;
  right:10px;
}

.del {
  background:var(--danger);
  color:#fff;
}

.edit {
  background:var(--edit);
  color:#fff;
}

.price {
  font-weight:bold;
  font-size:18px;
}
</style>

</head>
<body>

<header>PKRAAJ HUB ADMIN PANEL</header>

<div class="container">

  <input id="name" placeholder="Item Name">
  <input id="price" placeholder="Price">
  <input id="link" placeholder="Link">
  <input id="img" placeholder="Image URL">
  <textarea id="desc" placeholder="Description"></textarea>

  <button class="add-btn" id="addBtn">ADD POST</button>

  <div id="posts"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let editKey = null;

// ADD OR UPDATE
document.getElementById('addBtn').onclick = () => {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const link = document.getElementById('link').value;
  const desc = document.getElementById('desc').value;
  const img = document.getElementById('img').value;

  if(!name || !link) return alert("Fill required fields");

  if(editKey){
    update(ref(db, 'posts/' + editKey), {name,price,link,desc,img});
    editKey = null;
    document.getElementById('addBtn').innerText = "ADD POST";
  } else {
    push(ref(db,'posts'), {name,price,link,desc,img});
  }

  document.getElementById('name').value='';
  document.getElementById('price').value='';
  document.getElementById('link').value='';
  document.getElementById('desc').value='';
  document.getElementById('img').value='';
};

// SHOW DATA
onValue(ref(db,'posts'), snap=>{
  const posts = document.getElementById('posts');
  posts.innerHTML='';

  snap.forEach(child=>{
    const data = child.val();
    const key = child.key;

    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <div class="actions">
        <button class="edit">EDIT</button>
        <button class="del">DELETE</button>
      </div>

      <img src="${data.img || 'https://via.placeholder.com/300'}" width="100%">
      <h3>${data.name}</h3>
      <p>${data.desc}</p>
      <div class="price">${data.price}</div>
      <a href="${data.link}" target="_blank">Open</a>
    `;

    // DELETE
    div.querySelector('.del').onclick = ()=>{
      if(confirm("Delete?")){
        remove(ref(db,'posts/'+key));
      }
    };

    // EDIT
    div.querySelector('.edit').onclick = ()=>{
      document.getElementById('name').value = data.name;
      document.getElementById('price').value = data.price;
      document.getElementById('link').value = data.link;
      document.getElementById('desc').value = data.desc;
      document.getElementById('img').value = data.img;

      editKey = key;
      document.getElementById('addBtn').innerText = "UPDATE POST";
    };

    posts.appendChild(div);
  });

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PKRAAJ HUB | Permanent Store</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f1f5f9; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: var(--light); padding-bottom: 80px; }
        
        header { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; }
        .admin-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Form Styling */
        #postForm { display: none; background: white; padding: 20px; border-bottom: 2px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
        .save-btn { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Tabs & Container */
        .tabs { background: white; display: flex; overflow-x: auto; padding: 10px; gap: 10px; border-bottom: 1px solid #ddd; position: sticky; top: 52px; z-index: 99; }
        .tab { padding: 8px 20px; border-radius: 20px; border: 1px solid #ccc; background: #fff; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }
        
        .container { padding: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        .card-img { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: white; }
        .card-body { padding: 15px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-buy { background: var(--primary); color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">PKRAAJ HUB</div>
    <button class="admin-btn" onclick="document.getElementById('postForm').style.display='block'">+ NEW POST</button>
</header>

<div id="postForm">
    <input type="text" id="pName" placeholder="Product Name">
    <input type="text" id="pLink" placeholder="Download/Buy Link (URL)">
    <input type="text" id="pPrice" placeholder="Price (e.g. ₹299 or FREE)">
    <select id="pFolder">
        <option value="blogger">Blogger</option>
        <option value="wordpress">WordPress</option>
        <option value="apps">Apps</option>
    </select>
    <button class="save-btn" onclick="savePost()">POST PERMANENTLY</button>
    <button onclick="document.getElementById('postForm').style.display='none'" style="width:100%; background:none; border:none; color:red; margin-top:10px;">Close</button>
</div>

<div class="tabs">
    <button class="tab active" onclick="filter('all')">All</button>
    <button class="tab" onclick="filter('blogger')">Blogger</button>
    <button class="tab" onclick="filter('wordpress')">WordPress</button>
    <button class="tab" onclick="filter('apps')">Apps</button>
</div>

<div class="container" id="postContainer"></div>

<script>
    // पेज लोड होते ही पुरानी पोस्ट दिखाओ
    window.onload = function() { loadPosts(); };

    function savePost() {
        let name = document.getElementById('pName').value;
        let link = document.getElementById('pLink').value;
        let price = document.getElementById('pPrice').value;
        let folder = document.getElementById('pFolder').value;

        if(!name || !link) return alert("Details भरें!");

        let postData = { name, link, price, folder };
        
        // पुरानी पोस्ट निकालो और नयी जोड़ो
        let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
        posts.push(postData);
        localStorage.setItem('myPosts', JSON.stringify(posts));

        document.getElementById('postForm').style.display='none';
        loadPosts();
    }

    function loadPosts() {
        let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
        let container = document.getElementById('postContainer');
        container.innerHTML = '';

        posts.forEach(post => {
            let color = post.folder === 'blogger' ? '#2563eb' : post.folder === 'apps' ? '#f59e0b' : '#764abc';
            let icon = post.folder === 'blogger' ? '🎨' : post.folder === 'apps' ? '📱' : '🌐';
            
            container.innerHTML += `
                <div class="card ${post.folder}">
                    <div class="card-img" style="background:${color}">${icon}</div>
                    <div class="card-body">
                        <h3 style="margin:0">${post.name}</h3>
                        <div class="card-footer">
                            <span style="font-weight:900; font-size:1.2rem;">${post.price}</span>
                            <a href="${post.link}" class="btn-buy" style="background:${post.price === 'FREE' ? '#10b981' : '#2563eb'}">${post.price === 'FREE' ? 'Download' : 'Buy Now'}</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filter(cat) {
        let cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            if(cat === 'all') c.style.display = 'block';
            else c.classList.contains(cat) ? c.style.display = 'block' : c.style.display = 'none';
        });
    }
</script>

</body>
</html>
